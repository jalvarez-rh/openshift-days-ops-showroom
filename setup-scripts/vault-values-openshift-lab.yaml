# HashiCorp Vault Helm values for OpenShift workshop labs.
# Chart: https://github.com/hashicorp/vault-helm
# Docs: https://developer.hashicorp.com/vault/docs/platform/k8s/helm
#
# Use docker.io/ image paths so OpenShift does not rewrite short names to
# registry.connect.redhat.com (where hashicorp/vault tags are not published).

global:
  openshift: true

injector:
  enabled: true
  image:
    repository: "docker.io/hashicorp/vault-k8s"
    tag: "1.7.2"
  agentImage:
    repository: "docker.io/hashicorp/vault"
    tag: "1.21.2"

server:
  image:
    repository: "docker.io/hashicorp/vault"
    tag: "1.21.2"

  # Dev mode: auto-initialized and unsealed for hands-on labs only (data lost on restart).
  dev:
    enabled: true
    devRootToken: "root"

  ui:
    enabled: true

  route:
    enabled: true

csi:
  enabled: false
