# Demo app: reads a secret from Vault via the Agent Injector (workshop lab).
# Prerequisites: Vault running in namespace vault (dev mode), Kubernetes auth configured.
# Apply: oc apply -f demo-vault-app.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-vault-app
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: demo-vault-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-vault-app
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "demo-app"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/demo-app/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/demo-app/config" -}}
          API_KEY={{ .Data.data.api_key }}
          DB_PASSWORD={{ .Data.data.db_password }}
          {{- end }}
        vault.hashicorp.com/agent-inject-address: "http://vault.vault.svc:8200"
    spec:
      serviceAccountName: demo-app
      containers:
        - name: app
          image: registry.access.redhat.com/ubi9/ubi-minimal
          command: ["sleep", "infinity"]
